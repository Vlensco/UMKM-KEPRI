  <!-- Border -->
  <rect x="2" y="2" width="96" height="96" rx="18" fill="none" stroke="#00f2fe" stroke-width="2" stroke-opacity="0.3" />
  <!-- Bridge pylon (Barelang) -->
  <path d="M50,15 L18,80 L82,80 Z" fill="none" stroke="#10b981" stroke-width="6" stroke-linejoin="round" />
  <!-- Cables -->
  <line x1="50" y1="35" x2="31" y2="80" stroke="#00f2fe" stroke-width="3" />
  <line x1="50" y1="35" x2="69" y2="80" stroke="#00f2fe" stroke-width="3" />
  <line x1="50" y1="55" x2="40" y2="80" stroke="#00f2fe" stroke-width="3" />
  <line x1="50" y1="55" x2="60" y2="80" stroke="#00f2fe" stroke-width="3" />
  <!-- Road/Horizon -->
  <line x1="10" y1="80" x2="90" y2="80" stroke="#00f2fe" stroke-width="6" stroke-linecap="round" />
</svg>